<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Focus Supply & Training - Formations en Intelligence Émotionnelle et Achats</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Focus Supply & Training - Expert en formation en Intelligence Émotionnelle et optimisation des achats et approvisionnements">
  <meta name="keywords" content="formation, intelligence émotionnelle, achats, approvisionnements, leadership, coaching">
  <meta name="author" content="Focus Supply & Training">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/logo.png">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Variables Couleurs Orange */
    :root {
      --primary: #e67e22;
      --primary-light: #f39c12;
      --primary-dark: #d35400;
      --gradient-primary: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    }

    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
    }

    /* Écran de chargement */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--gradient-primary);
      color: white;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-logo-real {
      width: 180px;
      height: auto;
      margin-bottom: 2rem;
      animation: pulse 1.5s ease-in-out infinite;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
    }

    .loading-logo-fallback {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px 0;
    }

    .loading-text {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 1px;
      margin-top: 1rem;
    }

    .loading-subtext {
      font-size: 0.8rem;
      opacity: 0.8;
      margin-top: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.9;
      }
    }

    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <img
    src="assets/images/logo.png"
    alt="Focus Supply & Training"
    class="loading-logo-real"
    onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block'">

  <div class="loading-logo-fallback" id="fallbackLogo" style="display: none;">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" stroke="white" stroke-width="2" fill="none"/>
      <path d="M50 20 L65 45 L55 45 L55 80 L45 80 L45 45 L35 45 Z" fill="white"/>
      <text x="50" y="70" text-anchor="middle" fill="var(--primary)" font-size="12" font-weight="bold">FST</text>
    </svg>
  </div>

  <div class="loading-spinner"></div>
  <p class="loading-text">Focus Supply & Training</p>
  <p class="loading-subtext">Là où l'efficience opérationnelle rencontre l'excellence humaine</p>
</div>

<app-root></app-root>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen) {
        loadingScreen.classList.add('hide');
        setTimeout(function() {
          loadingScreen.style.display = 'none';
        }, 500);
      }
    }, 800);
  });

  window.addEventListener('load', function() {
    setTimeout(function() {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen && loadingScreen.style.display !== 'none') {
        loadingScreen.classList.add('hide');
        setTimeout(function() {
          loadingScreen.style.display = 'none';
        }, 500);
      }
    }, 1000);
  });
</script>
</body>
</html>
